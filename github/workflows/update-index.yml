name: Regenerate INDEX

on: push: branches: - main workflow_dispatch: {}

jobs: build: runs-on: ubuntu-latest steps: - name: Checkout uses: actions/checkout@v4 with: fetch-depth: 0 - name: Set up Python uses: actions/setup-python@v4 with: python-version: '3.x' - name: Install dependencies run: | python -m pip install --upgrade pip - name: Run index generator run: | python scripts/generate_index.py - name: Commit and push INDEX changes run: | git config user.name "github-actions[bot]" git config user.email "41898282+github-actions[bot]@users.noreply.github.com" git add INDEX.md INDEX.mr.md || true if ! git diff --quiet --staged; then git commit -m "Auto-regenerate INDEX (via workflow)" git push origin HEAD:main else echo "No changes to INDEX" fi env: GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
